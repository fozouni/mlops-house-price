# .github/workflows/mlops-pipeline.yml

name: MLOps Pipeline

on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  # وظیفه‌ی شماره ۱: تست کد
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        python -c "import pandas; import sklearn; print('All imports successful!')"
        echo "✅ All tests passed!"

  # وظیفه‌ی شماره ۲: ساخت ایمیج داکر
  build-docker:
    runs-on: ubuntu-latest
    needs: test  
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/house-price-predictor:latest
          ${{ secrets.DOCKER_USERNAME }}/house-price-predictor:${{ github.sha }}