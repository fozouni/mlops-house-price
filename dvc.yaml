# dvc.yaml

stages:
  generate_data:
    cmd: python src/generate_data.py
    deps:
      - src/generate_data.py
    outs:
      - data/housing_data.csv

  train_model:
    cmd: python src/train.py
    deps:
      - src/train.py
      - data/housing_data.csv
    outs:
      - models/model_v1.pkl
    metrics:
      - metrics.json